services:
  db:
    image: postgres:15
    container_name: hboyjd-srm-db
    environment:
      POSTGRES_DB: hboyjd_srm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hboyjd-srm-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: hboyjd-srm-api
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

volumes:
  pg_data:

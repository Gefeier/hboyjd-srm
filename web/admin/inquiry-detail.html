<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比价详情 · 采购中心 · 欧阳聚德供应商协同平台</title>
<link rel="stylesheet" href="../shared.css">
<style>
body { background: var(--gray-50); }

/* ===== Admin 通用布局 ===== */
.admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; padding-top: 72px; }
.admin-aside { position: fixed; top: 72px; left: 0; bottom: 0; width: 260px; background: var(--white); border-right: 1px solid var(--gray-100); padding: 28px 0; overflow-y: auto; }
.admin-user { padding: 0 24px 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 20px; }
.admin-user .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-600), var(--navy-700)); color: var(--white); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; margin-right: 10px; float: left; }
.admin-user .info { padding-left: 50px; }
.admin-user .name { font-size: 14px; font-weight: 500; color: var(--navy-900); }
.admin-user .role { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.aside-group { margin-bottom: 16px; }
.aside-group h6 { font-size: 11px; color: var(--gray-400); font-weight: 500; padding: 8px 24px; text-transform: uppercase; }
.aside-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 24px; font-size: 14px; color: var(--gray-700); transition: all 0.15s; border-left: 3px solid transparent; }
.aside-nav a:hover { background: var(--gray-50); color: var(--navy-900); }
.aside-nav a.active { background: var(--blue-50); color: var(--blue-700); font-weight: 500; border-left-color: var(--blue-600); }
.admin-main { grid-column: 2; padding: 32px 40px 80px; }

/* ===== Breadcrumb + header ===== */
.crumb { font-size: 12px; color: var(--gray-500); margin-bottom: 14px; }
.crumb a { color: var(--blue-600); text-decoration: none; }
.crumb a:hover { text-decoration: underline; }

.detail-head {
    background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 28px 34px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
}
.detail-head::after {
    content: "";
    position: absolute;
    right: -60px; top: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(96,165,250,0.25), transparent 65%);
    pointer-events: none;
}
.detail-head .row1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
.detail-head .code-txt { font-size: 12px; color: var(--blue-400); font-family: ui-monospace, monospace; letter-spacing: 1px; margin-bottom: 8px; }
.detail-head h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
.detail-head .meta-line { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.8; }
.detail-head .meta-line .sep { margin: 0 10px; color: rgba(255,255,255,0.25); }
.detail-head .actions { display: flex; gap: 8px; flex-shrink: 0; }
.detail-head .action-btn { padding: 7px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: var(--radius-pill); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.detail-head .action-btn:hover { background: rgba(255,255,255,0.2); }
.detail-head .action-btn.danger:hover { background: rgba(239,68,68,0.6); border-color: rgba(239,68,68,0.8); }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500; }
.status-badge.open { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(96,165,250,0.4); }
.status-badge.closed { background: rgba(100,116,139,0.2); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.4); }
.award-note { margin-top: 14px; padding: 10px 14px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35); border-radius: var(--radius-sm); font-size: 13px; color: #6ee7b7; }
.award-note b { color: #d1fae5; font-weight: 500; }

/* ===== 要求说明 ===== */
.req-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 18px 24px; margin-bottom: 20px; }
.req-card h4 { font-size: 13px; color: var(--navy-900); margin-bottom: 10px; font-weight: 600; }
.req-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; font-size: 13px; }
.req-grid .fld .l { color: var(--gray-500); font-size: 11.5px; margin-bottom: 3px; }
.req-grid .fld .v { color: var(--gray-700); }
.req-remark { grid-column: 1 / -1; padding-top: 10px; margin-top: 4px; border-top: 1px dashed var(--gray-100); color: var(--gray-700); line-height: 1.7; }

/* ===== 比价矩阵 ===== */
.cmp-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); overflow: hidden; }
.cmp-head { padding: 16px 24px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
.cmp-head h3 { font-size: 15px; color: var(--navy-900); font-weight: 600; }
.cmp-head .hint { font-size: 12px; color: var(--gray-500); }

.cmp-table-wrap { overflow-x: auto; }
.cmp-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.cmp-tbl th, .cmp-tbl td { padding: 12px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; text-align: center; }
.cmp-tbl th { background: var(--gray-50); font-size: 12px; font-weight: 500; color: var(--gray-600); }
.cmp-tbl th.stick, .cmp-tbl td.stick { text-align: left; min-width: 240px; position: sticky; left: 0; background: #fff; z-index: 2; border-right: 1px solid var(--gray-100); }
.cmp-tbl th.stick { background: var(--gray-50); z-index: 3; }
.cmp-tbl td.stick { font-weight: 500; color: var(--navy-900); }
.cmp-tbl .item-name { color: var(--navy-900); }
.cmp-tbl .item-spec { font-size: 11.5px; color: var(--gray-500); margin-top: 2px; font-weight: 400; }
.cmp-tbl .qty-unit { font-size: 11.5px; color: var(--gray-400); font-weight: 400; white-space: nowrap; }

.supp-head { min-width: 160px; }
.supp-head .name { color: var(--navy-900); font-weight: 500; margin-bottom: 2px; }
.supp-head .sub { font-size: 11px; color: var(--gray-500); font-weight: 400; }
.supp-head .sub b { color: var(--warn-500); font-weight: 500; }
.supp-head .sub b.done { color: var(--ok-500); }
.supp-head .link-row { display: inline-flex; gap: 4px; margin-top: 6px; justify-content: center; }
.supp-head .lk-btn {
    padding: 3px 9px; font-size: 11px; border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-600);
    cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 3px;
    transition: all 0.14s;
}
.supp-head .lk-btn:hover { border-color: var(--blue-500); color: var(--blue-600); background: var(--blue-50); }
.supp-head .lk-btn svg { width: 11px; height: 11px; }
.supp-head .lk-btn.copied { background: var(--ok-50); color: var(--ok-500); border-color: #6ee7b7; }

.cell-price { font-variant-numeric: tabular-nums; color: var(--gray-700); }
.cell-price.lowest { background: var(--ok-50); color: var(--ok-500); font-weight: 600; }
.cell-price .note { display: block; font-size: 11px; color: var(--gray-400); margin-top: 2px; font-weight: 400; }
.cell-empty { color: var(--gray-300); font-size: 18px; }

.total-row { background: var(--gray-50); font-weight: 600; }
.total-row td { padding: 14px; }
.total-val { font-size: 14px; color: var(--navy-900); font-variant-numeric: tabular-nums; }
.total-val.lowest { color: var(--ok-500); }

.award-row td { padding: 14px 14px 18px; border-bottom: none; }
.award-btn { padding: 7px 14px; background: var(--white); border: 1px solid var(--blue-200); color: var(--blue-700); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.award-btn:hover { background: var(--blue-600); color: #fff; border-color: var(--blue-600); }
.award-btn.is-awarded { background: var(--ok-500); color: #fff; border-color: var(--ok-500); }
.award-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.empty-state { padding: 80px 24px; text-align: center; color: var(--gray-500); }
.empty-state h4 { color: var(--navy-900); font-size: 15px; margin: 10px 0 6px; font-weight: 500; }

/* 登录态URL复制卡 */
.invite-info { margin-top: 18px; padding: 14px 18px; background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: var(--radius-sm); }
.invite-info p { font-size: 12.5px; color: var(--blue-700); line-height: 1.8; margin: 0; }
.invite-info code { background: #fff; padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 12px; color: var(--navy-700); }

@media (max-width: 900px) {
    .admin-aside { display: none; }
    .admin-shell { grid-template-columns: 1fr; }
    .admin-main { padding: 24px 20px; }
    .req-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="navbar always-solid">
    <div class="nav-container">
        <a href="../index.html" class="nav-logo"><img src="../assets/logo-white.png" alt="欧阳聚德"><span class="nav-suffix">采购中心</span></a>
        <ul class="nav-links">
            <li><a href="https://hboyjd.com">官网首页</a></li>
            <li><a href="../bids.html">采购公告</a></li>
            <li><a href="index.html">采购中心</a></li>
            <li><a href="#">帮助中心</a></li>
        </ul>
        <a href="#" class="nav-cta" style="background: transparent; border: 1px solid rgba(255,255,255,0.3);"><span>加载中</span></a>
    </div>
</nav>

<div class="admin-shell">
    <aside class="admin-aside">
        <div class="admin-user">
            <div class="avatar" id="asideAvatar">欧</div>
            <div class="info">
                <div class="name" id="asideName">加载中</div>
                <div class="role"><span class="pill pill-blue" id="asideRole">采购主管</span></div>
            </div>
        </div>
        <div class="aside-group">
            <h6>工作台</h6>
            <nav class="aside-nav"><a href="index.html"><span>概览首页</span></a></nav>
        </div>
        <div class="aside-group">
            <h6>供应商管理</h6>
            <nav class="aside-nav">
                <a href="suppliers.html"><span>合格供应商库</span></a>
                <a href="suppliers.html?status=pending"><span>入驻审核</span></a>
            </nav>
        </div>
        <div class="aside-group">
            <h6>寻源与采购</h6>
            <nav class="aside-nav">
                <a href="inquiries.html" class="active"><span>询价单管理</span></a>
                <a href="compare.html"><span>比价与定点</span></a>
            </nav>
        </div>
    </aside>

    <main class="admin-main" id="mainBox">
        <div class="crumb">
            <a href="index.html">采购中心</a> / <a href="inquiries.html">询价单管理</a> / <span id="crumbCode">—</span>
        </div>

        <div id="content"><div style="padding:60px;text-align:center;color:var(--gray-400)">加载中...</div></div>
    </main>
</div>

<script src="../shared.js"></script>
<script>
(function () {
    if (!requireAuth({ requireAdmin: true })) return;
    const u = SRMAuth.getUser();
    if (u) {
        const roleLabel = u.role === "admin" ? "管理员" : u.role === "buyer" ? "采购主管" : "审批员";
        document.getElementById("asideAvatar").textContent = (u.name || u.username).charAt(0);
        document.getElementById("asideName").textContent = u.name || u.username;
        document.getElementById("asideRole").textContent = roleLabel;
    }

    const esc = (s) => (s || "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
    const fmtDate = (iso) => iso ? iso.slice(0, 16).replace("T", " ") : "—";
    const fmtMoney = (n) => n == null ? "—" : Number(n).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    // 把字符串转成 type=date input 需要的 "YYYY-MM-DD" 格式;不合法则返回空
    function toDateValue(s) {
        if (!s) return "";
        const m = String(s).match(/^(\d{4}-\d{2}-\d{2})/);
        return m ? m[1] : "";
    }
    // 格式化交期显示:合法日期返回友好格式,其他原样
    function fmtDeliveryDate(s) {
        if (!s) return "—";
        const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return `${m[1]}年${parseInt(m[2])}月${parseInt(m[3])}日`;
        return s;
    }
    // 把后端 ISO(UTC) 转成 datetime-local input 用的本地时间字符串 "YYYY-MM-DDTHH:MM"
    function toLocalDTValue(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const pad = n => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    // 截止时间倒计时:返回 { text, kind }  kind: "ok"/"soon"/"expired"
    function deadlineBadge(iso) {
        if (!iso) return null;
        const target = new Date(iso).getTime();
        const now = Date.now();
        const diff = target - now;
        const fmt = `${new Date(iso).toLocaleString("zh-CN", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" })}`;
        if (diff <= 0) return { text: `已截止 · ${fmt}`, kind: "expired" };
        const hours = diff / 3600000;
        if (hours < 24) return { text: `${fmt} · 仅剩 ${Math.ceil(hours)} 小时`, kind: "soon" };
        const days = Math.ceil(hours / 24);
        return { text: `${fmt} · 还剩 ${days} 天`, kind: "ok" };
    }

    const params = new URLSearchParams(location.search);
    const inquiryId = parseInt(params.get("id"));
    const isNew = params.get("new") === "1";
    if (!inquiryId) { alert("缺少询价单ID"); location.href = "inquiries.html"; return; }

    async function load() {
        const box = document.getElementById("content");
        try {
            const res = await srmFetch("/api/v1/inquiries/" + inquiryId);
            if (!res.ok) throw new Error((await res.json()).detail || "加载失败");
            const d = await res.json();
            render(d);
            document.getElementById("crumbCode").textContent = d.code;
        } catch (err) {
            box.innerHTML = `<div class="empty-state" style="color:var(--danger-500)">加载失败: ${esc(err.message)}</div>`;
        }
    }

    function render(d) {
        // 建立索引: lineBySupplier[sid][itemId] = line
        const lineBy = {};
        for (const line of d.quote_lines) {
            (lineBy[line.supplier_id] ||= {})[line.inquiry_item_id] = line;
        }
        const suppliers = d.suppliers;
        const items = d.items;

        // 计算每供应商的总价 (只计该供应商有报价的 item 的 qty*price)
        const totals = {};
        for (const s of suppliers) {
            let sum = 0;
            let allQuoted = true;
            for (const it of items) {
                const line = (lineBy[s.id] || {})[it.id];
                if (line) sum += Number(line.unit_price) * Number(it.qty);
                else allQuoted = false;
            }
            totals[s.id] = { sum, allQuoted, qty: Object.keys(lineBy[s.id] || {}).length };
        }

        // 每行最低价供应商ID
        const lowestByItem = {};
        for (const it of items) {
            let bestPrice = Infinity, bestSid = null;
            for (const s of suppliers) {
                const line = (lineBy[s.id] || {})[it.id];
                if (line && Number(line.unit_price) < bestPrice) {
                    bestPrice = Number(line.unit_price);
                    bestSid = s.id;
                }
            }
            lowestByItem[it.id] = bestSid;
        }
        // 总价最低的供应商(必须全部报过价)
        let lowestTotalSid = null, bestTotal = Infinity;
        for (const s of suppliers) {
            const t = totals[s.id];
            if (t.allQuoted && t.sum < bestTotal) {
                bestTotal = t.sum;
                lowestTotalSid = s.id;
            }
        }

        const statusBadge = d.status === "open"
            ? '<span class="status-badge open">填价中</span>'
            : '<span class="status-badge closed">已关闭</span>';

        const awardBlock = d.awarded_supplier_name
            ? `<div class="award-note">已定标给 <b>${esc(d.awarded_supplier_name)}</b>${d.awarded_note ? " · " + esc(d.awarded_note) : ""}</div>`
            : "";

        const actionsHtml = d.status === "open"
            ? `<button class="action-btn" id="editBtn" title="编辑标题/说明/交期/地址"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>编辑</button>
               <button class="action-btn" id="copyLinkBtn" title="复制供应商端入口"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>复制邀请链接</button>
               <button class="action-btn danger" id="closeBtn">关闭比价单</button>`
            : "";

        const newTip = isNew ? `<div class="invite-info"><p>已成功创建比价单,并向 <b>${suppliers.length}</b> 家供应商发送邀请。<br>供应商登录自己账号后会在工作台看到「待我填价」条目,点进去即可填写。你也可以直接把访问地址 <code>${location.origin}/dashboard.html</code> 分享给他们。</p></div>` : "";

        const head = `
          <section class="detail-head">
            <div class="row1">
              <div style="flex:1;min-width:0">
                <div class="code-txt">${esc(d.code)}</div>
                <h1>${esc(d.title)}</h1>
                <div class="meta-line">
                    ${statusBadge}
                    <span class="sep">·</span>创建人 ${esc(d.buyer_name || "—")}
                    <span class="sep">·</span>创建于 ${fmtDate(d.created_at)}
                    ${d.closed_at ? `<span class="sep">·</span>关闭于 ${fmtDate(d.closed_at)}` : ""}
                </div>
                ${awardBlock}
                ${newTip}
              </div>
              <div class="actions">${actionsHtml}</div>
            </div>
          </section>
        `;

        // 要求说明(去掉交货地址 — 供应商报价阶段不需要)
        const dl = deadlineBadge(d.quote_deadline);
        const dlColor = dl ? (dl.kind === "expired" ? "#dc2626" : dl.kind === "soon" ? "#d97706" : "#10b981") : "#94a3b8";
        const req = `
          <section class="req-card">
            <h4>要求说明</h4>
            <div class="req-grid">
                <div class="fld"><div class="l">要求到货日期</div><div class="v">${esc(fmtDeliveryDate(d.delivery_date))}</div></div>
                <div class="fld"><div class="l">报价截止</div><div class="v" style="color:${dlColor}">${dl ? esc(dl.text) : "未设(不限期)"}</div></div>
                <div class="fld"><div class="l">邀请/已报</div><div class="v">${suppliers.length} 家 / <b style="color:${d.quoted_count === suppliers.length && suppliers.length > 0 ? 'var(--ok-500)' : 'var(--warn-500)'}">${d.quoted_count}</b> 家</div></div>
                <div class="fld"><div class="l">物料模式</div><div class="v">${items.length > 0 ? "采购员预设(方式1)" : "供应商自报(方式4)"}</div></div>
                ${d.remark ? `<div class="req-remark"><div style="font-weight:600;color:#0a1628;margin-bottom:6px">需求说明</div><div style="white-space:pre-wrap;line-height:1.75">${esc(d.remark)}</div></div>` : ""}
            </div>
          </section>
        `;

        // 比价矩阵
        let matrix;
        if (!items.length || !suppliers.length) {
            matrix = `<div class="empty-state"><h4>暂无物料或供应商</h4></div>`;
        } else {
            // 建立 supplier_id -> token 索引
            const tokenBySup = {};
            (d.invites || []).forEach(v => { tokenBySup[v.supplier_id] = v.token; });

            const theadSup = suppliers.map(s => {
                const t = totals[s.id];
                const doneFlag = t.qty === items.length;
                const quoteStatus = t.qty === 0 ? '<b>未报价</b>' : doneFlag ? `<b class="done">已全报</b>` : `<b>部分 ${t.qty}/${items.length}</b>`;
                const tk = tokenBySup[s.id];
                const linkRow = tk && d.status === "open" ? `
                    <div class="link-row">
                        <button class="lk-btn" data-copy-link="${tk}" title="复制填报链接,发给供应商">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                            复制链接
                        </button>
                        <button class="lk-btn" data-open-link="${tk}" title="预览供应商看到的页面">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            预览
                        </button>
                    </div>` : "";
                return `<th class="supp-head">
                    <div class="name">${esc(s.company_name)}</div>
                    <div class="sub">${esc(s.code)} · ${quoteStatus}</div>
                    ${linkRow}
                </th>`;
            }).join("");

            const bodyRows = items.map(it => {
                const cells = suppliers.map(s => {
                    const line = (lineBy[s.id] || {})[it.id];
                    if (!line) return `<td class="cell-empty">—</td>`;
                    const cls = lowestByItem[it.id] === s.id && suppliers.length > 1 ? "lowest" : "";
                    return `<td class="cell-price ${cls}">¥${fmtMoney(line.unit_price)}${line.note ? `<span class="note">${esc(line.note)}</span>` : ""}</td>`;
                }).join("");
                return `
                    <tr>
                        <td class="stick">
                            <div class="item-name">${esc(it.name)}</div>
                            ${it.spec ? `<div class="item-spec">${esc(it.spec)}</div>` : ""}
                            <div class="qty-unit">${Number(it.qty)} ${esc(it.unit)}${it.remark ? " · " + esc(it.remark) : ""}</div>
                        </td>
                        ${cells}
                    </tr>
                `;
            }).join("");

            // 合计行
            const totalCells = suppliers.map(s => {
                const t = totals[s.id];
                if (t.qty === 0) return `<td class="total-val">—</td>`;
                const cls = lowestTotalSid === s.id && suppliers.length > 1 ? "lowest" : "";
                const prefix = t.allQuoted ? "" : `<span style="font-size:10px;color:var(--gray-400);display:block">(仅${t.qty}项)</span>`;
                return `<td class="total-val ${cls}">¥${fmtMoney(t.sum)}${prefix}</td>`;
            }).join("");
            const totalRow = `<tr class="total-row"><td class="stick">合计金额 <span style="font-size:11px;color:var(--gray-500);font-weight:400">(数量×单价)</span></td>${totalCells}</tr>`;

            // 定标按钮行(仅 open 状态显示)
            let awardRow = "";
            if (d.status === "open") {
                const awardCells = suppliers.map(s => {
                    const t = totals[s.id];
                    const dis = t.qty === 0 ? "disabled" : "";
                    return `<td><button class="award-btn" data-award="${s.id}" ${dis}>定标给他</button></td>`;
                }).join("");
                awardRow = `<tr class="award-row"><td class="stick" style="color:var(--gray-500);font-weight:500">定标选择</td>${awardCells}</tr>`;
            } else if (d.awarded_supplier_id) {
                const awardCells = suppliers.map(s => {
                    const isAward = s.id === d.awarded_supplier_id;
                    return `<td>${isAward ? '<button class="award-btn is-awarded" disabled>已中标</button>' : '<span style="color:var(--gray-300);font-size:12px">落标</span>'}</td>`;
                }).join("");
                awardRow = `<tr class="award-row"><td class="stick" style="color:var(--gray-500);font-weight:500">定标结果</td>${awardCells}</tr>`;
            }

            matrix = `
              <section class="cmp-card">
                <div class="cmp-head">
                    <h3>比价矩阵</h3>
                    <div class="hint">${items.length} 项物料 × ${suppliers.length} 家供应商${suppliers.length > 1 ? " · 每行绿色为该项最低价,合计行绿色为全项总价最低" : ""}</div>
                </div>
                <div class="cmp-table-wrap">
                    <table class="cmp-tbl">
                        <thead><tr><th class="stick">物料</th>${theadSup}</tr></thead>
                        <tbody>${bodyRows}${totalRow}${awardRow}</tbody>
                    </table>
                </div>
              </section>
            `;
        }

        // 若无 preset items,matrix 显示占位,主要数据在下方"各家报价详情"里
        const matrixFinal = items.length > 0 ? matrix : "";
        // 占位 — 各家报价详情区(异步加载)
        const sqPlaceholder = `<section id="sqBox"><div style="padding:40px;text-align:center;color:var(--gray-400)">加载各家报价详情...</div></section>`;

        document.getElementById("content").innerHTML = head + req + matrixFinal + sqPlaceholder;

        // 把关键数据存闭包,供后面的"各家报价"和复制链接按钮用
        window.__d = d;
        loadSupplierQuotes();

        // 绑定操作
        const editBtn = document.getElementById("editBtn");
        if (editBtn) editBtn.addEventListener("click", () => openEditModal(d));

        const closeBtn = document.getElementById("closeBtn");
        if (closeBtn) closeBtn.addEventListener("click", async () => {
            if (!confirm("关闭后供应商无法再修改报价,确认关闭吗?")) return;
            try {
                const r = await srmFetch(`/api/v1/inquiries/${inquiryId}/close`, { method: "POST" });
                if (!r.ok) throw new Error((await r.json()).detail || "操作失败");
                load();
            } catch (err) { alert(err.message); }
        });

        const copyBtn = document.getElementById("copyLinkBtn");
        if (copyBtn) copyBtn.addEventListener("click", () => {
            const url = location.origin + "/dashboard.html";
            navigator.clipboard.writeText(url).then(() => {
                copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>已复制';
                setTimeout(() => load(), 1600);
            }).catch(() => alert("地址: " + url));
        });

        document.querySelectorAll("[data-award]").forEach(btn => btn.addEventListener("click", async () => {
            const sid = parseInt(btn.dataset.award);
            const sup = suppliers.find(s => s.id === sid);
            const note = prompt(`定标给「${sup.company_name}」,可备注理由(可选):`, "");
            if (note === null) return;
            try {
                const r = await srmFetch(`/api/v1/inquiries/${inquiryId}/award`, {
                    method: "POST",
                    body: JSON.stringify({ supplier_id: sid, note: note || null }),
                });
                if (!r.ok) throw new Error((await r.json()).detail || "操作失败");
                load();
            } catch (err) { alert(err.message); }
        }));

        // 复制填报链接
        document.querySelectorAll("[data-copy-link]").forEach(btn => btn.addEventListener("click", () => {
            const tk = btn.dataset.copyLink;
            const url = location.origin + "/q.html?t=" + encodeURIComponent(tk);
            const origHTML = btn.innerHTML;
            const done = () => {
                btn.classList.add("copied");
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>已复制';
                setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = origHTML; }, 1800);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(done, () => prompt("复制失败,请手动复制:", url));
            } else {
                prompt("请复制以下链接:", url);
            }
        }));

        // 预览供应商视角
        document.querySelectorAll("[data-open-link]").forEach(btn => btn.addEventListener("click", () => {
            const tk = btn.dataset.openLink;
            window.open("/q.html?t=" + encodeURIComponent(tk), "_blank");
        }));
    }

    function openHistoryModal(hist, sup) {
        const revs = hist.revisions || [];
        const fmtDT = (iso) => iso ? iso.slice(0, 16).replace("T", " ") : "—";

        // 按 (产品名 + 规格) 为 key,沉淀每版价格
        const keyOf = (r) => (r.name || "") + "|" + (r.spec || "");
        // 单价序列: key -> [{version, price, qty}]
        const priceSeries = {};
        revs.forEach(rev => {
            rev.rows.forEach(r => {
                const k = keyOf(r);
                if (!priceSeries[k]) priceSeries[k] = [];
                priceSeries[k].push({ version: rev.version, price: Number(r.unit_price), qty: r.qty });
            });
        });

        // 涨跌符号
        const trend = (cur, prev) => {
            if (prev == null || cur == null) return "";
            if (cur > prev) return ` <span style="color:#dc2626;font-size:11px">🔺+${((cur/prev - 1) * 100).toFixed(1)}%</span>`;
            if (cur < prev) return ` <span style="color:#10b981;font-size:11px">🔻${((cur/prev - 1) * 100).toFixed(1)}%</span>`;
            return ` <span style="color:#94a3b8;font-size:11px">═ 持平</span>`;
        };

        const versionsHtml = revs.map((rev, i) => {
            const prev = i > 0 ? revs[i - 1] : null;
            const deltaHtml = prev ? trend(Number(rev.total_amount), Number(prev.total_amount)) : "";
            const rowsHtml = rev.rows.length ? rev.rows.map(r => {
                const k = keyOf(r);
                const ser = priceSeries[k] || [];
                // 找当前版本在该行的历史
                const myIdx = ser.findIndex(x => x.version === rev.version);
                const prevOfItem = myIdx > 0 ? ser[myIdx - 1] : null;
                const itemDelta = prevOfItem ? trend(Number(r.unit_price), prevOfItem.price) : "";
                return `
                    <tr>
                        <td style="color:var(--navy-900);font-weight:500">${esc(r.name)}</td>
                        <td style="color:var(--gray-600);font-size:12px">${esc(r.spec || "—")}</td>
                        <td style="text-align:right;font-variant-numeric:tabular-nums">${r.qty != null ? Number(r.qty) + " " + esc(r.unit) : "<span style='color:var(--gray-400)'>—</span>"}</td>
                        <td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:500">¥${fmtMoney(r.unit_price)}${itemDelta}</td>
                    </tr>
                `;
            }).join("") : `<tr><td colspan="4" style="text-align:center;color:var(--gray-400);padding:14px">未提交明细</td></tr>`;

            const sourceBadge = rev.source_summary === "ai_parsed"
                ? '<span style="padding:2px 8px;background:#eff6ff;color:#1d4ed8;border-radius:999px;font-size:10px;margin-left:6px">含AI识别</span>'
                : rev.source_summary === "mixed"
                ? '<span style="padding:2px 8px;background:#fef3c7;color:#92400e;border-radius:999px;font-size:10px;margin-left:6px">混合</span>'
                : rev.source_summary === "bootstrap"
                ? '<span style="padding:2px 8px;background:#f1f5f9;color:#64748b;border-radius:999px;font-size:10px;margin-left:6px">历史迁入</span>'
                : "";

            return `
                <div style="background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:16px 20px;margin-bottom:14px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                        <div>
                            <span style="font-size:15px;font-weight:600;color:var(--navy-900)">v${rev.version}</span>
                            ${sourceBadge}
                            <span style="margin-left:10px;color:var(--gray-500);font-size:12.5px">${fmtDT(rev.committed_at)}</span>
                        </div>
                        <div>
                            <span style="font-size:12px;color:var(--gray-500)">总金额</span>
                            <span style="font-size:17px;font-weight:600;color:var(--navy-900);font-variant-numeric:tabular-nums;margin-left:6px">¥${fmtMoney(rev.total_amount)}</span>
                            ${deltaHtml}
                        </div>
                    </div>
                    <table style="width:100%;border-collapse:collapse;font-size:13px">
                        <thead>
                            <tr style="background:var(--gray-50)">
                                <th style="padding:8px 12px;text-align:left;font-weight:500;color:var(--gray-500);font-size:11px">产品</th>
                                <th style="padding:8px 12px;text-align:left;font-weight:500;color:var(--gray-500);font-size:11px">规格</th>
                                <th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--gray-500);font-size:11px">数量</th>
                                <th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--gray-500);font-size:11px">单价</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
            `;
        }).join("");

        const mask = document.createElement("div");
        mask.style.cssText = "position:fixed;inset:0;background:rgba(10,22,40,0.55);z-index:10000;padding:40px 20px;overflow-y:auto";
        mask.innerHTML = `
            <div style="max-width:900px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.3)">
                <div style="padding:20px 28px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:flex-start">
                    <div>
                        <h3 style="font-size:17px;font-weight:600;color:#0a1628">调价历史 · ${esc(sup.company_name)}</h3>
                        <p style="font-size:12.5px;color:#64748b;margin-top:4px">共 ${revs.length} 次提交 · 按提交时间升序</p>
                    </div>
                    <button id="hxClose" style="background:transparent;border:none;font-size:22px;color:#94a3b8;cursor:pointer;padding:0;width:32px;height:32px;border-radius:8px">&times;</button>
                </div>
                <div style="padding:18px 22px;max-height:calc(100vh - 180px);overflow-y:auto;background:#f8fafc">
                    ${revs.length ? versionsHtml : '<div style="padding:40px;text-align:center;color:#94a3b8">该供应商尚未提交任何报价</div>'}
                </div>
            </div>
        `;
        document.body.appendChild(mask);
        const close = () => mask.remove();
        mask.querySelector("#hxClose").addEventListener("click", close);
        mask.addEventListener("click", (e) => { if (e.target === mask) close(); });
        document.addEventListener("keydown", function onkey(e) {
            if (e.key === "Escape") { close(); document.removeEventListener("keydown", onkey); }
        });
    }

    async function loadSupplierQuotes() {
        const box = document.getElementById("sqBox");
        if (!box) return;
        try {
            const res = await srmFetch(`/api/v1/inquiries/${inquiryId}/supplier-quotes`);
            if (!res.ok) throw new Error((await res.json()).detail || "加载失败");
            const data = await res.json();
            renderSupplierQuotes(box, data);
        } catch (err) {
            box.innerHTML = `<div style="padding:20px;color:var(--danger-500)">各家报价加载失败: ${err.message}</div>`;
        }
    }

    function renderSupplierQuotes(box, data) {
        const suppliers = data.suppliers || [];
        if (!suppliers.length) {
            box.innerHTML = "";
            return;
        }

        const fmtDateTime = (iso) => iso ? iso.slice(0, 16).replace("T", " ") : "—";
        const fmtSize = (n) => n < 1024 ? n + " B" : n < 1024*1024 ? (n/1024).toFixed(1) + " KB" : (n/1024/1024).toFixed(2) + " MB";

        // 最低总价高亮(仅在有报价的人里比)
        const quotedSups = suppliers.filter(s => s.quoted_at);
        let lowestSid = null;
        if (quotedSups.length > 1) {
            const sorted = [...quotedSups].sort((a, b) => Number(a.total_amount) - Number(b.total_amount));
            if (sorted[0].total_amount > 0) lowestSid = sorted[0].supplier_id;
        }

        const cards = suppliers.map(s => {
            const isLowest = s.supplier_id === lowestSid;
            const isAwarded = s.supplier_id === (data.awarded_supplier_id || null);
            const headerCls = isLowest ? "sq-head sq-head-low" : "sq-head";
            const badge = s.quoted_at
                ? (isLowest ? '<span class="sq-badge sq-b-low">最低总价</span>' : '<span class="sq-badge sq-b-ok">已报价</span>')
                : '<span class="sq-badge sq-b-wait">未报价</span>';

            const rowsHtml = s.rows.length ? s.rows.map(r => `
                <tr>
                    <td style="color:var(--navy-900);font-weight:500">${esc(r.name)}${r.source === "ai_parsed" ? ' <span style="font-size:10px;padding:1px 6px;background:var(--blue-50);color:var(--blue-700);border-radius:999px;margin-left:4px">AI识别</span>' : ''}</td>
                    <td style="color:var(--gray-600);font-size:12px">${esc(r.spec || "—")}</td>
                    <td style="text-align:right;font-variant-numeric:tabular-nums">${r.qty != null ? Number(r.qty) + " " + esc(r.unit) : "<span style='color:var(--gray-400)'>—</span>"}</td>
                    <td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:500;color:var(--navy-900)">¥${fmtMoney(r.unit_price)}</td>
                    <td style="text-align:right;font-variant-numeric:tabular-nums">${r.qty != null ? "¥" + fmtMoney(Number(r.qty) * Number(r.unit_price)) : "<span style='color:var(--gray-400)'>—</span>"}</td>
                    <td style="color:var(--gray-500);font-size:11.5px">${esc(r.note || "")}</td>
                </tr>
            `).join("") : `<tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:20px">未填明细</td></tr>`;

            const attsHtml = s.attachments.length ? s.attachments.map(a => `
                <a href="/api/v1/inquiries/${inquiryId}/attachment/${a.id}/download" class="sq-att" target="_blank" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span>${esc(a.filename)}</span>
                    <span style="color:var(--gray-400);font-size:11px">${fmtSize(a.file_size)}</span>
                </a>
            `).join("") : "";

            const awardBtnHtml = (window.__d && window.__d.status !== "closed") && s.quoted_at
                ? `<button class="sq-award" data-award="${s.supplier_id}">定标给他</button>`
                : (isAwarded ? '<span class="sq-awarded">✓ 已中标</span>' : "");

            // 复制填报链接按钮(从外层 d.invites 找 token)
            const invites = (window.__d && window.__d.invites) || [];
            const invite = invites.find(v => v.supplier_id === s.supplier_id);
            // 调价历史按钮(至少1版时显示)
            const historyBtnHtml = (s.revision_count && s.revision_count >= 1) ? `
                <button class="sq-link-btn" data-history="${s.supplier_id}" title="查看调价历史">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    调价历史 ${s.revision_count > 1 ? "v" + s.current_version : ""}
                </button>
            ` : "";

            const linkBtnHtml = (invite && window.__d && window.__d.status !== "closed") ? `
                <button class="sq-link-btn" data-copy-link="${invite.token}" title="复制填报链接发给供应商">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                    复制链接
                </button>
                <button class="sq-link-btn" data-open-link="${invite.token}" title="预览供应商看到的页面">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            ` : "";

            return `
                <div class="sq-card ${isLowest ? "sq-card-low" : ""}">
                    <div class="${headerCls}">
                        <div>
                            <div class="sq-name">${esc(s.company_name)}</div>
                            <div class="sq-meta">${esc(s.supplier_code)}${s.contact_phone ? " · " + esc(s.contact_phone) : ""} · ${s.quoted_at ? "提交于 " + fmtDateTime(s.quoted_at) : "尚未提交"}</div>
                        </div>
                        <div class="sq-right">${badge}${historyBtnHtml}${linkBtnHtml}${awardBtnHtml}</div>
                    </div>
                    <div class="sq-body">
                        ${s.rows.length ? `
                        <table class="sq-tbl">
                            <thead><tr><th>产品</th><th>规格</th><th style="text-align:right">数量</th><th style="text-align:right">单价</th><th style="text-align:right">小计</th><th>备注</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>` : rowsHtml.includes("未填") ? `<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">未填报价明细</div>` : ""}
                        ${attsHtml ? `<div class="sq-atts"><div class="sq-atts-title">附件(${s.attachments.length})</div><div class="sq-att-list">${attsHtml}</div></div>` : ""}
                        <div class="sq-total">
                            <span style="color:var(--gray-500)">总金额:</span>
                            <span class="sq-total-val ${isLowest ? "low" : ""}">¥ ${fmtMoney(s.total_amount)}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join("");

        box.innerHTML = `
            <style>
                .sq-wrap { margin-top: 22px; }
                .sq-title { font-size: 16px; color: var(--navy-900); font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
                .sq-title .hint { font-size: 12px; color: var(--gray-500); font-weight: 400; }
                .sq-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
                .sq-card-low { border-color: var(--ok-500); box-shadow: 0 0 0 1px var(--ok-500); }
                .sq-head { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; background: var(--gray-50); }
                .sq-head-low { background: var(--ok-50); }
                .sq-name { font-size: 15px; font-weight: 600; color: var(--navy-900); }
                .sq-meta { font-size: 11.5px; color: var(--gray-500); margin-top: 3px; }
                .sq-right { display: flex; align-items: center; gap: 10px; }
                .sq-badge { padding: 4px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500; }
                .sq-b-low { background: var(--ok-500); color: #fff; }
                .sq-b-ok { background: var(--blue-50); color: var(--blue-700); }
                .sq-b-wait { background: var(--gray-100); color: var(--gray-500); }
                .sq-award { padding: 6px 14px; background: var(--white); border: 1px solid var(--blue-200); color: var(--blue-700); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: inherit; }
                .sq-award:hover { background: var(--blue-600); color: #fff; border-color: var(--blue-600); }
                .sq-awarded { padding: 5px 14px; background: var(--ok-500); color: #fff; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; }
                .sq-link-btn {
                    padding: 5px 10px; background: var(--white); color: var(--gray-600);
                    border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
                    font-size: 11.5px; cursor: pointer; font-family: inherit;
                    display: inline-flex; align-items: center; gap: 4px; transition: all 0.14s;
                }
                .sq-link-btn:hover { border-color: var(--blue-500); color: var(--blue-600); background: var(--blue-50); }
                .sq-link-btn.copied { background: var(--ok-50); color: var(--ok-500); border-color: #6ee7b7; }
                .sq-body { padding: 6px 0 14px; }
                .sq-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
                .sq-tbl th { background: var(--gray-50); padding: 8px 14px; font-size: 11px; color: var(--gray-500); text-align: left; font-weight: 500; border-bottom: 1px solid var(--gray-100); }
                .sq-tbl td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
                .sq-tbl tr:last-child td { border-bottom: none; }
                .sq-atts { padding: 10px 20px; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
                .sq-atts-title { font-size: 11px; color: var(--gray-500); margin-bottom: 6px; }
                .sq-att-list { display: flex; flex-wrap: wrap; gap: 8px; }
                .sq-att {
                    display: inline-flex; align-items: center; gap: 6px;
                    padding: 6px 12px; background: #fff; border: 1px solid var(--gray-200);
                    border-radius: var(--radius-sm); font-size: 12.5px; color: var(--gray-700);
                    text-decoration: none; transition: all 0.15s;
                }
                .sq-att:hover { border-color: var(--blue-500); color: var(--blue-700); background: var(--blue-50); }
                .sq-total { display: flex; justify-content: flex-end; align-items: center; gap: 10px; padding: 12px 20px 4px; font-size: 13.5px; }
                .sq-total-val { font-size: 18px; font-weight: 600; color: var(--navy-900); font-variant-numeric: tabular-nums; }
                .sq-total-val.low { color: var(--ok-500); }
            </style>
            <div class="sq-wrap">
                <div class="sq-title">
                    <span>各家报价详情</span>
                    <span class="hint">${suppliers.length} 家 · ${quotedSups.length} 已报${lowestSid ? " · 绿框为最低总价" : ""}</span>
                </div>
                ${cards}
            </div>
        `;

        // 绑定复制链接
        box.querySelectorAll("[data-copy-link]").forEach(btn => btn.addEventListener("click", () => {
            const tk = btn.dataset.copyLink;
            const url = location.origin + "/q.html?t=" + encodeURIComponent(tk);
            const origHTML = btn.innerHTML;
            const done = () => {
                btn.classList.add("copied");
                btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>已复制';
                setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = origHTML; }, 1800);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(done, () => prompt("复制失败,请手动:", url));
            } else {
                prompt("请复制:", url);
            }
        }));
        box.querySelectorAll("[data-open-link]").forEach(btn => btn.addEventListener("click", () => {
            window.open("/q.html?t=" + encodeURIComponent(btn.dataset.openLink), "_blank");
        }));

        // 调价历史弹窗
        box.querySelectorAll("[data-history]").forEach(btn => btn.addEventListener("click", async () => {
            const sid = parseInt(btn.dataset.history);
            const sup = data.suppliers.find(s => s.supplier_id === sid);
            try {
                const res = await srmFetch(`/api/v1/inquiries/${inquiryId}/supplier-quotes/${sid}/history`);
                if (!res.ok) throw new Error((await res.json()).detail || "加载失败");
                const hist = await res.json();
                openHistoryModal(hist, sup);
            } catch (err) { alert("调价历史加载失败: " + err.message); }
        }));

        // 绑定定标按钮
        box.querySelectorAll("[data-award]").forEach(btn => btn.addEventListener("click", async () => {
            const sid = parseInt(btn.dataset.award);
            const sup = data.suppliers.find(s => s.supplier_id === sid);
            const note = prompt(`定标给「${sup.company_name}」,可备注理由(可选):`, "");
            if (note === null) return;
            try {
                const r = await srmFetch(`/api/v1/inquiries/${inquiryId}/award`, {
                    method: "POST",
                    body: JSON.stringify({ supplier_id: sid, note: note || null }),
                });
                if (!r.ok) throw new Error((await r.json()).detail || "操作失败");
                load();
            } catch (err) { alert(err.message); }
        }));
    }

    load();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价大盘 · 欧阳聚德采购中心</title>
<link rel="stylesheet" href="../shared.css">
<style>
body { background: var(--gray-50); }
.admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; padding-top: 72px; }
.admin-aside { position: fixed; top: 72px; left: 0; bottom: 0; width: 260px; background: var(--white); border-right: 1px solid var(--gray-100); padding: 28px 0; overflow-y: auto; }
.admin-user { padding: 0 24px 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 20px; }
.admin-user .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-600), var(--navy-700)); color: var(--white); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; margin-right: 10px; float: left; }
.admin-user .info { padding-left: 50px; }
.admin-user .name { font-size: 14px; font-weight: 500; color: var(--navy-900); }
.admin-user .role { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.aside-group { margin-bottom: 16px; }
.aside-group h6 { font-size: 11px; color: var(--gray-400); font-weight: 500; padding: 8px 24px; text-transform: uppercase; }
.aside-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 24px; font-size: 14px; color: var(--gray-700); border-left: 3px solid transparent; }
.aside-nav a:hover { background: var(--gray-50); color: var(--navy-900); }
.aside-nav a.active { background: var(--blue-50); color: var(--blue-700); font-weight: 500; border-left-color: var(--blue-600); }

.admin-main { grid-column: 2; padding: 32px 40px 80px; }
.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-head h1 { font-size: 24px; font-weight: 600; color: var(--navy-900); }
.page-head .sub { color: var(--gray-500); font-size: 13px; margin-top: 4px; }

/* KPI 横条 */
.kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 18px 22px; }
.kpi-card .lbl { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
.kpi-card .val { font-size: 28px; font-weight: 700; color: var(--navy-900); line-height: 1; font-variant-numeric: tabular-nums; }
.kpi-card .val-unit { font-size: 13px; color: var(--gray-500); font-weight: 400; margin-left: 4px; }
.kpi-card .hint { margin-top: 8px; font-size: 12px; color: var(--gray-500); }
.kpi-card.warn .val { color: var(--warn-500); }
.kpi-card.danger .val { color: var(--danger-500); }
.kpi-card.ok .val { color: var(--ok-500); }

/* Filter tabs */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 18px; padding: 4px; background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius); width: fit-content; }
.filter-tabs button { padding: 8px 16px; background: transparent; border: none; cursor: pointer; font-size: 13px; color: var(--gray-600); border-radius: var(--radius-sm); font-family: inherit; transition: all 0.15s; }
.filter-tabs button:hover { color: var(--navy-900); }
.filter-tabs button.active { background: var(--blue-600); color: var(--white); }
.filter-tabs button .badge { display: inline-block; margin-left: 6px; background: rgba(0,0,0,0.1); color: inherit; padding: 0 6px; border-radius: 8px; font-size: 11px; }
.filter-tabs button.active .badge { background: rgba(255,255,255,0.25); }

/* 思维导图卡片 */
.mind-list { display: flex; flex-direction: column; gap: 16px; }
.mind-card { background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 6px; cursor: pointer; transition: all 0.15s; overflow: hidden; }
.mind-card:hover { border-color: var(--blue-300); box-shadow: var(--shadow); }
.mind-card.expired { background: linear-gradient(135deg, #fef2f2 0%, #fff 30%); }
.mind-card.due-soon { background: linear-gradient(135deg, #fffbeb 0%, #fff 30%); }
.mind-card.awarded { background: linear-gradient(135deg, #f0fdf4 0%, #fff 30%); }

.mind-svg { display: block; width: 100%; height: auto; }
.mind-svg .branch-line { fill: none; stroke-width: 1.6; stroke-linecap: round; }
.mind-svg .branch-line.normal { stroke: #cbd5e1; }
.mind-svg .branch-line.warn { stroke: #f59e0b; }
.mind-svg .branch-line.danger { stroke: #ef4444; }
.mind-svg .branch-line.ok { stroke: #10b981; }
.mind-svg .branch-line.gold { stroke: #f59e0b; stroke-width: 2.4; }

.mind-svg .root-rect {
    fill: url(#rootGradNavy);
    stroke: #1e3a8a;
    stroke-width: 1.5;
    rx: 12; ry: 12;
}
.mind-svg .root-rect.expired { fill: url(#rootGradRed); stroke: #b91c1c; }
.mind-svg .root-rect.awarded { fill: url(#rootGradGreen); stroke: #047857; }

.mind-node {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 8px 12px;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04);
    font-size: 13px;
    color: var(--navy-900);
    overflow: hidden;
}
.mind-node .node-ic { font-size: 16px; flex-shrink: 0; line-height: 1; }
.mind-node .node-body { flex: 1; min-width: 0; line-height: 1.35; }
.mind-node .node-body .l1 { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mind-node .node-body .l2 { font-size: 11px; color: var(--gray-500); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mind-node .node-pill { font-size: 10px; padding: 1px 7px; border-radius: 8px; flex-shrink: 0; }

.mind-node.deadline-warn { border-left: 3px solid #f59e0b; }
.mind-node.deadline-warn .l2 { color: #d97706; font-weight: 500; }
.mind-node.deadline-danger { border-left: 3px solid #ef4444; background: #fef2f2; }
.mind-node.deadline-danger .l2 { color: #dc2626; font-weight: 600; }

.mind-node.material { border-left: 3px solid var(--blue-500); }

.mind-node.supplier-pending { border-left: 3px solid #cbd5e1; }
.mind-node.supplier-pending .node-pill { background: #f1f5f9; color: #64748b; }

.mind-node.supplier-quoted { border-left: 3px solid #3b82f6; background: #eff6ff; }
.mind-node.supplier-quoted .node-pill { background: #dbeafe; color: #1d4ed8; }

.mind-node.supplier-awarded {
    border: 2px solid #f59e0b;
    background: linear-gradient(135deg, #fef3c7, #fff);
}
.mind-node.supplier-awarded .node-ic { color: #d97706; }
.mind-node.supplier-awarded .node-pill { background: #f59e0b; color: #fff; font-weight: 600; }

.mind-node.award-pending { border-left: 3px solid #f59e0b; background: #fffbeb; color: #92400e; font-weight: 500; }
.mind-node.award-done { border-left: 3px solid #10b981; background: #ecfdf5; color: #065f46; font-weight: 500; }

.root-content {
    color: #fff;
    padding: 10px 14px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-sizing: border-box;
    overflow: hidden;
}
.root-content .r-code { font-family: monospace; font-size: 11px; opacity: 0.75; letter-spacing: 0.5px; }
.root-content .r-title { font-size: 15px; font-weight: 600; margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.root-content .r-meta { font-size: 11px; opacity: 0.85; }
.root-content .r-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.root-content .r-cats .chip { background: rgba(255,255,255,0.18); padding: 1px 7px; border-radius: 8px; font-size: 10px; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--gray-500); background: var(--white); border-radius: var(--radius); border: 1px dashed var(--gray-200); }
.empty-state h4 { color: var(--navy-900); font-size: 15px; margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

@media (max-width: 980px) {
    .admin-aside { display: none; }
    .admin-shell { grid-template-columns: 1fr; }
    .admin-main { padding: 24px 18px; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav class="navbar always-solid">
    <div class="nav-container">
        <a href="../index.html" class="nav-logo">
            <img src="../assets/logo-white.png" alt="欧阳聚德">
            <span class="nav-suffix">采购中心</span>

<div class="admin-shell">
    <aside class="admin-aside">
        <div class="admin-user">
            <div class="avatar" id="asideAvatar">欧</div>
            <div class="info">
                <div class="name" id="asideName">加载中</div>
                <div class="role"><span class="pill pill-blue" id="asideRole">采购主管</span></div>
            </div>
        </div>
        <div class="aside-group">
            <h6>工作台</h6>
            <nav class="aside-nav">
                <a href="index.html"><span>概览首页</span></a>
                <a href="dashboard.html" class="active"><span>询价大盘</span></a>
            </nav>

        <div class="aside-group">

            <nav class="aside-nav">

    <main class="admin-main">
        <div class="page-head">

            </div>

        <!-- KPI -->
        <div class="kpi-strip">

            <div class="kpi-card warn">
                <div class="lbl">即将截止 (24h内)</div>

            <div class="kpi-card danger">

                <div class="val"><span id="kpiExpired">—</span><span class="val-unit">单</span></div>

            <div class="kpi-card ok">

        <!-- Filter tabs -->
        <div class="filter-tabs" id="filterTabs">

            <button data-filter="open">进行中 <span class="badge" id="cntOpen">0</span></button>
            <button data-filter="due_soon">即将截止 <span class="badge" id="cntDue">0</span></button>
            <button data-filter="expired">已超时 <span class="badge" id="cntExp">0</span></button>
            <button data-filter="closed">已关闭 <span class="badge" id="cntCls">0</span></button>
        </div>

        <!-- SVG defs (gradient) -->
        <svg width="0" height="0" style="position:absolute" aria-hidden="true">
            <defs>
                <linearGradient id="rootGradNavy" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#1e3a8a"/>
                    <stop offset="100%" stop-color="#0f172a"/>
                </linearGradient>
                <linearGradient id="rootGradRed" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#b91c1c"/>
                    <stop offset="100%" stop-color="#7f1d1d"/>
                </linearGradient>
                <linearGradient id="rootGradGreen" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#047857"/>
                    <stop offset="100%" stop-color="#064e3b"/>
                </linearGradient>
            </defs>
        </svg>

        <div class="mind-list" id="mindList"></div>

<script src="../shared.js"></script>
<script>
(function () {
    if (!requireAuth({ requireAdmin: true })) return;

    const u = SRMAuth.getUser();
    if (u) {
        const roleLabel = u.role === "admin" ? "管理员" : u.role === "buyer" ? "采购主管" : "审批员";
        document.getElementById("asideAvatar").textContent = (u.name || u.username).charAt(0);
        document.getElementById("asideName").textContent = u.name || u.username;
        document.getElementById("asideRole").textContent = roleLabel;
    }

    const esc = (s) => (s || "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);

    function fmtDeadline(iso) {
        if (!iso) return null;
        const d = new Date(iso);
        const now = new Date();
        const diff = (d - now) / 1000;
        const ymd = d.toLocaleDateString("zh-CN", {month:"2-digit",day:"2-digit"}) +
                    " " + d.toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit",hour12:false});
        if (diff < 0) {
            const hours = Math.abs(Math.floor(diff / 3600));
            return { text: ymd, sub: hours < 24 ? `已超时 ${hours}h` : `已超时 ${Math.floor(hours/24)} 天`, status: "expired" };
        }
        if (diff < 86400) {
            const hours = Math.floor(diff / 3600);
            const mins = Math.floor((diff % 3600) / 60);
            return { text: ymd, sub: `剩 ${hours}h ${mins}m`, status: "due_soon" };
        }
        const days = Math.floor(diff / 86400);
        return { text: ymd, sub: `剩 ${days} 天`, status: "ok" };
    }

    function categorize(inq) {
        // 返回:'closed' | 'expired' | 'due_soon' | 'open'
        if (inq.status === "closed") return "closed";
        const dl = inq.quote_deadline ? new Date(inq.quote_deadline) : null;
        if (dl) {
            const diff = (dl - new Date()) / 1000;
            if (diff < 0) return "expired";
            if (diff < 86400) return "due_soon";
        }
        return "open";
    }

    let allInquiries = [];
    let detailCache = {};   // id -> {items: [{category}]}
    let currentFilter = "all";

    async function loadAll() {
        try {
            const res = await srmFetch("/api/v1/inquiries?page_size=100");
            if (!res.ok) throw new Error("加载失败");
            const data = await res.json();
            allInquiries = Array.isArray(data.items) ? data.items : [];
            updateKPI();
            updateCounts();
            render();
            // 异步拉取每张单的详情(供应商列表 + 物料分类),拿到后单独刷该卡
            allInquiries.forEach(inq => {
                if (!detailCache[inq.id]) {
                    srmFetch("/api/v1/inquiries/" + inq.id).then(r => r.ok ? r.json() : null).then(d => {
                        if (!d) return;
                        detailCache[inq.id] = d;
                        const card = document.querySelector(`[data-inq-id="${inq.id}"]`);
                        if (card) {
                            const fresh = renderMindCard(inq);
                            const tmp = document.createElement("div");
                            tmp.innerHTML = fresh;
                            card.replaceWith(tmp.firstElementChild);
                        }
                    }).catch(()=>{});
                }
            });
        } catch (err) {
            document.getElementById("mindList").innerHTML = '<div class="empty-state" style="color:var(--danger-500)">加载失败: '+esc(err.message)+'</div>';
        }
    }

    function updateKPI() {
        const active = allInquiries.filter(x => x.status === "open").length;
        const dueSoon = allInquiries.filter(x => categorize(x) === "due_soon").length;
        const expired = allInquiries.filter(x => categorize(x) === "expired").length;
        const thisMonth = new Date().toISOString().slice(0, 7);
        const awarded = allInquiries.filter(x => x.status === "closed" && (x.closed_at || "").slice(0,7) === thisMonth).length;
        document.getElementById("kpiActive").textContent = active;
        document.getElementById("kpiDueSoon").textContent = dueSoon;
        document.getElementById("kpiExpired").textContent = expired;
        document.getElementById("kpiAwarded").textContent = awarded;
    }

    function updateCounts() {
        const c = { all: allInquiries.length, open: 0, due_soon: 0, expired: 0, closed: 0 };
        allInquiries.forEach(x => { c[categorize(x)]++; });
        document.getElementById("cntAll").textContent = c.all;
        document.getElementById("cntOpen").textContent = c.open;
        document.getElementById("cntDue").textContent = c.due_soon;
        document.getElementById("cntExp").textContent = c.expired;
        document.getElementById("cntCls").textContent = c.closed;
    }

    function uniqueCategories(items) {
        return [...new Set((items || []).map(x => x.category).filter(Boolean))];
    }

    // ============ 思维导图卡片渲染 ============
    // 布局常量
    const SVG_W = 1100;
    const ROOT = { x: 24, w: 240, h: 110 };          // 根节点
    const COL2 = { x: 380, w: 280, h: 56 };          // 二级节点列
    const BR_GAP = 14;                                // 节点垂直间距
    const PAD_TOP = 26;
    const PAD_BOTTOM = 26;

    function makeBranchPath(rootCx, rootCy, branchX, branchCy) {
        // 三次贝塞尔:从 root 右边到 branch 左边
        const dx = (branchX - rootCx) * 0.55;
        const c1x = rootCx + dx, c1y = rootCy;
        const c2x = branchX - dx, c2y = branchCy;
        return `M ${rootCx},${rootCy} C ${c1x},${c1y} ${c2x},${c2y} ${branchX},${branchCy}`;
    }

    function renderMindCard(inq) {
        const cat = categorize(inq);
        const deadline = fmtDeadline(inq.quote_deadline);
        const cardClass = inq.status === "closed" ? "awarded" :
                          cat === "expired" ? "expired" :
                          cat === "due_soon" ? "due-soon" : "";

        const detail = detailCache[inq.id];
        const suppliers = detail && detail.suppliers ? detail.suppliers : [];
        const invites = detail && detail.invites ? detail.invites : [];
        const quoteLines = detail && detail.quote_lines ? detail.quote_lines : [];

        // 已报价 supplier id 集合
        const quotedSet = new Set();
        invites.forEach(inv => { if (inv.quoted_at) quotedSet.add(inv.supplier_id); });
        quoteLines.forEach(q => quotedSet.add(q.supplier_id));

        // 物料分类
        const cats = detail ? uniqueCategories(detail.items) : [];

        // === 构造分支节点列表 ===
        // 顺序:截止 / 物料 / 供应商... / 定标
        const branches = [];

        // 1. 截止时间
        if (deadline) {
            const cls = deadline.status === "expired" ? "deadline-danger"
                      : deadline.status === "due_soon" ? "deadline-warn" : "";
            branches.push({
                cls, line: deadline.status === "expired" ? "danger" : deadline.status === "due_soon" ? "warn" : "normal",
                html: `
                    <div class="mind-node ${cls}">
                        <span class="node-ic">📅</span>
                        <div class="node-body">
                            <div class="l1">${esc(deadline.text)}</div>
                            <div class="l2">${esc(deadline.sub)}</div>
                        </div>
                    </div>`
            });
        } else {
            branches.push({
                cls: "", line: "normal",
                html: `
                    <div class="mind-node">
                        <span class="node-ic">📅</span>
                        <div class="node-body">
                            <div class="l1">未设截止时间</div>
                            <div class="l2">长期有效</div>
                        </div>
                    </div>`
            });
        }

        // 2. 物料 + 大类
        const catChips = cats.length
            ? cats.slice(0, 3).map(c => `<span style="background:#dbeafe;color:#1d4ed8;font-size:10px;padding:1px 6px;border-radius:7px;margin-right:3px">${esc(c)}</span>`).join("")
            : (detail ? '<span style="color:#94a3b8;font-style:italic">未分大类</span>' : '<span style="color:#94a3b8">加载中...</span>');
        branches.push({
            cls: "material", line: "normal",
            html: `
                <div class="mind-node material">
                    <span class="node-ic">📦</span>
                    <div class="node-body">
                        <div class="l1">物料 ${inq.item_count || 0} 项</div>
                        <div class="l2">${catChips}</div>
                    </div>
                </div>`
        });

        // 3. 每家供应商一支
        const awardedId = inq.awarded_supplier_id;
        suppliers.forEach(sup => {
            const hasQuoted = quotedSet.has(sup.id);
            const isAwarded = awardedId === sup.id;
            let nodeCls, lineCls, pill, ic;
            if (isAwarded) {
                nodeCls = "supplier-awarded"; lineCls = "gold"; pill = "👑 中标"; ic = "🏆";
            } else if (hasQuoted) {
                nodeCls = "supplier-quoted"; lineCls = "ok"; pill = "已报价"; ic = "💬";
            } else {
                nodeCls = "supplier-pending"; lineCls = "normal"; pill = "未报价"; ic = "🏭";
            }
            branches.push({
                cls: nodeCls, line: lineCls,
                html: `
                    <div class="mind-node ${nodeCls}">
                        <span class="node-ic">${ic}</span>
                        <div class="node-body">
                            <div class="l1">${esc(sup.company_name || "供应商")}</div>
                            <div class="l2">${esc(sup.code || "")}${sup.contact_phone ? ' · '+esc(sup.contact_phone) : ''}</div>
                        </div>
                        <span class="node-pill">${pill}</span>
                    </div>`
            });
        });

        // 没有 detail 时,用 invited_count 占位画 N 个未知节点
        if (!detail) {
            const n = inq.invited_count || 1;
            for (let i = 0; i < Math.min(n, 5); i++) {
                branches.push({
                    cls: "supplier-pending", line: "normal",
                    html: `
                        <div class="mind-node supplier-pending">
                            <span class="node-ic">🏭</span>
                            <div class="node-body">
                                <div class="l1" style="color:#94a3b8">加载中...</div>
                            </div>
                        </div>`
                });
            }
        }

        // 4. 定标节点
        const closedDone = inq.status === "closed" && awardedId;
        if (closedDone) {
            branches.push({
                cls: "award-done", line: "ok",
                html: `
                    <div class="mind-node award-done">
                        <span class="node-ic">✓</span>
                        <div class="node-body">
                            <div class="l1">已定标</div>
                            <div class="l2">${esc(inq.awarded_supplier_name || "")}</div>
                        </div>
                    </div>`
            });
        } else {
            const isOverdue = cat === "expired";
            branches.push({
                cls: "award-pending", line: isOverdue ? "danger" : "warn",
                html: `
                    <div class="mind-node award-pending">
                        <span class="node-ic">⚖️</span>
                        <div class="node-body">
                            <div class="l1">${isOverdue ? "已超时 · 待决断" : "待定标"}</div>
                            <div class="l2">收齐报价后选择中标方</div>
                        </div>
                    </div>`
            });
        }

        // === 计算坐标 ===
        const N = branches.length;
        const totalH = Math.max(220, PAD_TOP + N * (COL2.h + BR_GAP) - BR_GAP + PAD_BOTTOM);
        const rootCx = ROOT.x + ROOT.w;
        const rootCy = totalH / 2;
        const rootY = rootCy - ROOT.h / 2;

        // 根节点 HTML(嵌入 foreignObject)
        const rootCls = closedDone ? "awarded" : (cat === "expired" ? "expired" : "");
        const rootCatChips = cats.length
            ? `<div class="r-cats">${cats.slice(0, 3).map(c => `<span class="chip">${esc(c)}</span>`).join("")}</div>`
            : "";
        const rootStatus = closedDone ? "✓ 已定标"
                          : cat === "expired" ? "⚠ 已超时"
                          : cat === "due_soon" ? "⏰ 即将截止"
                          : "进行中";
        const rootHTML = `
            <div class="root-content">
                <div class="r-code">${esc(inq.code)}</div>
                <div class="r-title">${esc(inq.title)}</div>
                <div class="r-meta">采购员 · ${esc(inq.buyer_name || "—")} · ${rootStatus}</div>
                ${rootCatChips}
            </div>`;

        // 渲染 SVG
        let pathsHTML = "";
        let nodesHTML = "";
        branches.forEach((b, i) => {
            const by = PAD_TOP + i * (COL2.h + BR_GAP);
            const bcy = by + COL2.h / 2;
            pathsHTML += `<path class="branch-line ${b.line}" d="${makeBranchPath(rootCx, rootCy, COL2.x, bcy)}"/>`;
            nodesHTML += `<foreignObject x="${COL2.x}" y="${by}" width="${COL2.w}" height="${COL2.h}">${b.html}</foreignObject>`;
        });

        return `
            <div class="mind-card ${cardClass}" data-inq-id="${inq.id}" onclick="location.href='inquiry-detail.html?id=${inq.id}'">
                <svg class="mind-svg" viewBox="0 0 ${SVG_W} ${totalH}" preserveAspectRatio="xMidYMid meet">
                    ${pathsHTML}
                    <rect class="root-rect ${rootCls}" x="${ROOT.x}" y="${rootY}" width="${ROOT.w}" height="${ROOT.h}"/>
                    <foreignObject x="${ROOT.x}" y="${rootY}" width="${ROOT.w}" height="${ROOT.h}">${rootHTML}</foreignObject>
                    ${nodesHTML}
                </svg>
            </div>
        `;
    }

    function render() {
        const list = currentFilter === "all"
            ? allInquiries
            : allInquiries.filter(x => categorize(x) === currentFilter);

        if (!list.length) {
            document.getElementById("mindList").innerHTML = `
                <div class="empty-state">
                    <h4>这一栏暂无询价单</h4>
                    <p>切换标签查看其他状态,或点击右上「+ 新建询价」</p>
                </div>`;
            return;
        }

        // 排序:截止时间近的在前,无截止的在后,closed沉底
        list.sort((a, b) => {
            const sa = a.status === "closed" ? 1 : 0;
            const sb = b.status === "closed" ? 1 : 0;
            if (sa !== sb) return sa - sb;
            const da = a.quote_deadline ? new Date(a.quote_deadline).getTime() : Infinity;
            const db = b.quote_deadline ? new Date(b.quote_deadline).getTime() : Infinity;
            return da - db;
        });

        document.getElementById("mindList").innerHTML = list.map(renderMindCard).join("");
    }

    document.getElementById("filterTabs").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-filter]");
        if (!btn) return;
        document.querySelectorAll("#filterTabs button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        render();
    });

    loadAll();
    // 每 30 秒刷新倒计时
    setInterval(() => { if (allInquiries.length) render(); }, 30000);
})();
</script>
</body>
</html>

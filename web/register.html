<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商注册 · 欧阳聚德供应商协同平台</title>
<link rel="stylesheet" href="shared.css">
<style>
.reg-wrap {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 520px;
    background: var(--white);
}
.reg-side {
    background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
    color: var(--white);
    padding: 80px 60px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.reg-side::before {
    content: "";
    position: absolute; inset: 0;
    background: url('assets/team-trucks.jpg') center / cover;
    opacity: 0.18;
}
.reg-side-inner { position: relative; }
.reg-brand-logo img { height: 44px; }
.reg-side h1 {
    font-size: 36px; font-weight: 600;
    margin-top: 100px; line-height: 1.3;
}
.reg-side h1 b { color: var(--blue-400); }
.reg-side p {
    color: rgba(255,255,255,0.75);
    font-size: 15px; line-height: 1.8;
    margin-top: 20px; max-width: 440px;
}
.reg-side ul {
    margin-top: 32px;
    list-style: none;
    padding: 0;
}
.reg-side ul li {
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    padding: 8px 0;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.7;
}
.reg-side ul li::before {
    content: "";
    width: 5px; height: 5px;
    background: var(--blue-400);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 10px;
}
.reg-side-footer {
    position: relative;
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
}

.reg-form {
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.reg-form h2 {
    font-size: 28px;
    font-weight: 600;
    color: var(--navy-900);
    margin-bottom: 6px;
}
.reg-form .hint {
    color: var(--gray-500);
    font-size: 14px;
    margin-bottom: 32px;
}
.field-block { margin-bottom: 20px; }
.field-block label {
    display: block;
    font-size: 13px;
    color: var(--gray-600);
    margin-bottom: 8px;
    font-weight: 500;
}
.field-block input {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    transition: all 0.15s;
    background: var(--white);
}
.field-block input:focus {
    outline: none;
    border-color: var(--blue-500);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}
.field-hint {
    margin-top: 6px;
    font-size: 12px;
    color: var(--gray-500);
}

.msg {
    display: none;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.6;
}
.msg.show { display: block; }
.msg.err {
    background: var(--danger-50);
    color: #991b1b;
    border: 1px solid #fecaca;
}
.msg.ok {
    background: var(--ok-50);
    color: #065f46;
    border: 1px solid #6ee7b7;
}

.reg-btn {
    width: 100%;
    padding: 14px;
    background: var(--blue-600);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    margin-top: 8px;
}
.reg-btn:hover { background: var(--blue-700); box-shadow: var(--shadow-blue); }
.reg-btn:disabled { background: var(--gray-300); cursor: wait; }

.reg-foot-link {
    margin-top: 28px;
    text-align: center;
    color: var(--gray-500);
    font-size: 13px;
}
.reg-foot-link a {
    color: var(--blue-600);
    font-weight: 500;
    text-decoration: none;
    margin-left: 6px;
}
.reg-foot-link a:hover { text-decoration: underline; }

@media (max-width: 900px) {
    .reg-wrap { grid-template-columns: 1fr; }
    .reg-side { display: none; }
    .reg-form { padding: 60px 24px; }
}
</style>
</head>
<body>

<div class="reg-wrap">
    <aside class="reg-side">
        <div class="reg-side-inner">
            <a href="index.html" class="reg-brand-logo">
                <img src="assets/logo-white.png" alt="欧阳聚德">
            </a>
            <h1>加入欧阳聚德<br><b>供应商协同</b></h1>
            <p>只需 30 秒完成注册，登录后再完善企业资料。审核通过即可接收采购询价与参与定点合作。</p>
            <ul>
                <li>免费入驻，面向全国合格供应商开放</li>
                <li>采购员按您的供应品类精准邀标</li>
                <li>在线报价、合同、对账，全流程数字化</li>
                <li>专注半挂车制造 17 年的长期合作伙伴</li>
            </ul>
        </div>
        <div class="reg-side-footer">SUPPLIER ONBOARDING · hboyjd.com</div>
    </aside>

    <section class="reg-form">
        <h2>注册供应商账号</h2>
        <p class="hint">填 3 项基本信息开通账号，登录后再补全企业资料</p>

        <div class="msg err" id="errMsg"></div>
        <div class="msg ok" id="okMsg"></div>

        <form id="regForm">
            <div class="field-block">
                <label for="companyName">企业名称</label>
                <input type="text" id="companyName" required placeholder="营业执照上的公司全称" autocomplete="organization">
                <div class="field-hint">建议填写营业执照上的全称，方便后续审核。</div>
            </div>

            <div class="field-block">
                <label for="contactPhone">联系人手机号</label>
                <input type="tel" id="contactPhone" required maxlength="11" placeholder="11 位手机号，兼作登录账号" autocomplete="tel">
                <div class="field-hint">将用作登录账号，也是接收采购询价通知的号码。</div>
            </div>

            <div class="field-block">
                <label for="password">设置密码</label>
                <input type="password" id="password" required minlength="8" placeholder="至少 8 位" autocomplete="new-password">
                <div class="field-hint">登录后可在工作台修改密码。</div>
            </div>

            <button type="submit" class="reg-btn" id="submitBtn">注册并登录</button>
        </form>

        <div class="reg-foot-link">
            已有账号？<a href="login.html">直接登录</a>
        </div>
    </section>
</div>

<script src="shared.js"></script>
<script>
(function () {
    const form = document.getElementById("regForm");
    const err = document.getElementById("errMsg");
    const ok = document.getElementById("okMsg");
    const btn = document.getElementById("submitBtn");

    if (window.SRMAuth && SRMAuth.getToken()) {
        location.replace("dashboard.html");
        return;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.classList.remove("show");
        ok.classList.remove("show");

        const payload = {
            company_name: document.getElementById("companyName").value.trim(),
            contact_phone: document.getElementById("contactPhone").value.trim(),
            login_password: document.getElementById("password").value,
        };

        if (!/^1[3-9]\d{9}$/.test(payload.contact_phone)) {
            err.textContent = "请填写 11 位有效手机号";
            err.classList.add("show");
            return;
        }
        if (payload.login_password.length < 8) {
            err.textContent = "密码至少 8 位";
            err.classList.add("show");
            return;
        }

        btn.disabled = true; btn.textContent = "注册中...";
        try {
            const res = await fetch("/api/v1/suppliers/simple-register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || "注册失败");

            // 后端直接返回了 access_token,不用二次登录
            SRMAuth.setToken(data.access_token);
            SRMAuth.setUser({
                id: data.id,
                username: data.login_username,
                name: payload.company_name,
                role: "supplier",
                phone: payload.contact_phone,
                is_active: true,
            });

            ok.textContent = "注册成功！正在带你去工作台...";
            ok.classList.add("show");
            setTimeout(() => { location.replace("dashboard.html"); }, 1000);
        } catch (e2) {
            err.textContent = e2.message || "注册失败,请稍后重试";
            err.classList.add("show");
            btn.disabled = false; btn.textContent = "注册并登录";
        }
    });
})();
</script>
</body>
</html>

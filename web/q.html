<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价回函 · 湖北欧阳聚德汽车有限公司</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
    background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 260px, #f8fafc 100%);
    min-height: 100vh;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
}

.wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

/* ===== 企业抬头 ===== */
.letterhead {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 0 22px;
    border-bottom: 2px solid var(--navy-900);
    margin-bottom: 36px;
}
.letterhead .brand img { height: 54px; display: block; }
.letterhead .meta-line { flex: 1; text-align: right; font-size: 12.5px; color: var(--gray-500); line-height: 1.8; }
.letterhead .meta-line .doc-code { font-family: ui-monospace, 'SFMono-Regular', monospace; color: var(--navy-900); font-size: 13px; font-weight: 500; }
.letterhead .meta-line .doc-date { color: var(--gray-500); }

/* ===== 主标题 ===== */
.doc-title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    color: var(--navy-900);
    letter-spacing: 4px;
    margin-bottom: 28px;
}

/* ===== 称谓 ===== */
.salutation { font-size: 15px; color: var(--navy-900); margin-bottom: 14px; font-weight: 500; }
.salutation b { color: var(--blue-700); }
.intro {
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.9;
    text-indent: 2em;
    margin-bottom: 26px;
}

/* ===== 要求信息 ===== */
.req-box { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px 22px; margin-bottom: 20px; }
.req-box .row { display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; font-size: 13.5px; line-height: 1.8; }
.req-box .lbl { color: var(--gray-500); min-width: 86px; }
.req-box .val { color: var(--navy-900); }
.req-box .remark { grid-column: 1/-1; padding-top: 10px; margin-top: 4px; border-top: 1px dashed var(--gray-100); color: var(--gray-700); line-height: 1.8; }

/* ===== 报价表 ===== */
.quote-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.quote-card h3 { padding: 16px 22px; font-size: 15px; font-weight: 600; color: var(--navy-900); border-bottom: 1px solid var(--gray-100); background: var(--gray-50); margin: 0; }
.quote-card h3 .hint { font-size: 12px; color: var(--gray-500); font-weight: 400; margin-left: 10px; }

table { width: 100%; border-collapse: collapse; }
thead th { background: var(--gray-50); font-size: 12px; font-weight: 500; color: var(--gray-600); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--gray-100); }
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); font-size: 13.5px; color: var(--gray-700); vertical-align: top; }
tbody tr:last-child td { border-bottom: none; }
.idx { color: var(--gray-400); font-variant-numeric: tabular-nums; width: 36px; }
.name { color: var(--navy-900); font-weight: 500; }
.spec { color: var(--gray-500); font-size: 11.5px; margin-top: 3px; line-height: 1.5; }
.qty { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--navy-900); white-space: nowrap; }
.qty .unit { color: var(--gray-400); font-weight: 400; font-size: 11.5px; margin-left: 2px; }
.price-in { width: 130px; padding: 9px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; font-family: ui-monospace, monospace; text-align: right; }
.price-in:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
.price-in:disabled { background: var(--gray-50); color: var(--gray-500); }
.note-in { width: 100%; min-width: 150px; padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 12.5px; font-family: inherit; }
.note-in:focus { outline: none; border-color: var(--blue-500); }
.subtotal { color: var(--navy-900); font-variant-numeric: tabular-nums; font-weight: 500; text-align: right; white-space: nowrap; }
.subtotal.empty { color: var(--gray-300); font-weight: 400; }

/* 合计条 */
.total-bar {
    padding: 18px 22px;
    background: linear-gradient(to right, var(--blue-50), var(--white));
    border-top: 1px solid var(--gray-100);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.total-bar .lbl { font-size: 14px; color: var(--gray-600); }
.total-bar .val { font-size: 24px; color: var(--navy-900); font-weight: 600; font-variant-numeric: tabular-nums; margin-left: 10px; }

/* 提交区 */
.submit-row {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 18px;
}
.btn {
    padding: 12px 32px;
    border-radius: var(--radius-sm);
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid transparent;
    transition: all 0.18s;
}
.btn-primary { background: var(--blue-600); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--blue-700); box-shadow: var(--shadow-blue); }
.btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }

/* 联系方式/签章 */
.sign-block {
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px solid var(--gray-100);
    text-align: right;
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.9;
}
.sign-block b { color: var(--navy-900); font-weight: 500; }
.sign-block .company-line { font-size: 14.5px; color: var(--navy-900); font-weight: 600; margin-bottom: 2px; }

/* 消息提示 */
.msg-box {
    margin-bottom: 20px;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
}
.msg-box.ok { background: var(--ok-50); color: #065f46; border: 1px solid #6ee7b7; }
.msg-box.err { background: var(--danger-50); color: #991b1b; border: 1px solid #fecaca; }
.msg-box.info { background: var(--warn-50); color: #92400e; border: 1px solid #fde68a; }

/* 已提交标记 */
.quoted-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--ok-50);
    color: #065f46;
    border: 1px solid #6ee7b7;
    border-radius: var(--radius-pill);
    font-size: 12.5px;
    margin-left: 12px;
}
.closed-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--gray-100);
    color: var(--gray-600);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-pill);
    font-size: 12.5px;
    margin-left: 12px;
}

/* 404 / 错误状态 */
.fatal-state {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 80px 40px;
    text-align: center;
}
.fatal-state .big-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--gray-100);
    color: var(--gray-400);
    display: inline-flex;
    align-items: center; justify-content: center;
    margin-bottom: 20px;
}
.fatal-state h2 { font-size: 18px; color: var(--navy-900); font-weight: 600; margin-bottom: 8px; }
.fatal-state p { font-size: 14px; color: var(--gray-500); line-height: 1.8; }

@media (max-width: 640px) {
    .wrap { padding: 24px 14px 60px; }
    .doc-title { font-size: 20px; letter-spacing: 2px; }
    .letterhead { flex-direction: column; align-items: flex-start; gap: 10px; }
    .letterhead .meta-line { text-align: left; }
    .price-in { width: 100px; }
    .submit-row { flex-direction: column; }
    .btn { width: 100%; }
}
</style>
</head>
<body>

<div class="wrap">
    <!-- 抬头 -->
    <div class="letterhead">
        <div class="brand">
            <img src="assets/logo.png" alt="湖北欧阳聚德汽车" onerror="this.style.display='none'">
        </div>
        <div class="meta-line">
            <div class="doc-code" id="docCode">—</div>
            <div class="doc-date" id="docDate">—</div>
        </div>
    </div>

    <div id="content">
        <div class="fatal-state">
            <div class="big-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <h2>正在打开询价单...</h2>
            <p>请稍候</p>
        </div>
    </div>
</div>

<script>
(function () {
    const params = new URLSearchParams(location.search);
    const token = params.get('t') || location.pathname.split('/').pop();

    const esc = (s) => (s || "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
    const fmtMoney = (n) => Number(n).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtDate = (iso) => iso ? iso.slice(0, 10) : "—";
    const fmtDateTime = (iso) => iso ? iso.slice(0, 16).replace("T", " ") : "—";

    async function load() {
        if (!token || token.length < 16) {
            fatal("链接无效", "您访问的询价回函链接不正确或已失效,请联系对接人重新获取。");
            return;
        }
        try {
            const res = await fetch("/api/v1/public/quote/" + encodeURIComponent(token));
            const d = await res.json();
            if (res.status === 404) {
                fatal("链接无效或已过期", "您访问的询价回函链接已失效,请联系对接人重新获取。");
                return;
            }
            if (!res.ok) throw new Error(d.detail || "加载失败");
            render(d);
        } catch (err) {
            fatal("加载失败", esc(err.message || "网络异常,请刷新重试"));
        }
    }

    function fatal(title, desc) {
        document.getElementById("content").innerHTML = `
          <div class="fatal-state">
              <div class="big-icon">
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              </div>
              <h2>${esc(title)}</h2>
              <p>${desc}</p>
              <p style="margin-top:22px;font-size:12.5px;color:var(--gray-400)">联系对接人:湖北欧阳聚德汽车有限公司 采购中心</p>
          </div>
        `;
    }

    function render(d) {
        document.getElementById("docCode").textContent = d.code;
        document.getElementById("docDate").textContent = "发出日期:" + fmtDate(d.created_at);
        document.title = d.code + " · 询价回函 · 欧阳聚德";

        const isClosed = d.status === "closed";
        const hasQuoted = !!d.quoted_at;

        let statusLine = "";
        if (isClosed) {
            statusLine = `<span class="closed-badge">本询价单已截止,报价不可再修改</span>`;
        } else if (hasQuoted) {
            statusLine = `<span class="quoted-badge">您已于 ${fmtDateTime(d.quoted_at)} 提交过报价(本页可再次修改)</span>`;
        }

        // 物料行
        const itemRows = d.items.map((it, idx) => {
            const v = it.my_unit_price != null ? it.my_unit_price : "";
            return `
                <tr data-row data-item-id="${it.id}" data-qty="${it.qty}">
                    <td class="idx">${idx + 1}</td>
                    <td>
                        <div class="name">${esc(it.name)}</div>
                        ${it.spec ? `<div class="spec">${esc(it.spec)}</div>` : ""}
                        ${it.remark ? `<div class="spec" style="color:var(--gray-400)">补充:${esc(it.remark)}</div>` : ""}
                    </td>
                    <td class="qty">${Number(it.qty)}<span class="unit">${esc(it.unit)}</span></td>
                    <td><input type="number" class="price-in" data-price min="0" step="0.0001" value="${v}" placeholder="0.00" ${isClosed ? "disabled" : ""}></td>
                    <td><input type="text" class="note-in" data-note value="${esc(it.my_note || "")}" placeholder="含税/运费等备注" ${isClosed ? "disabled" : ""}></td>
                    <td class="subtotal empty" data-subtotal>—</td>
                </tr>
            `;
        }).join("");

        const html = `
          <div class="doc-title">询 价 单</div>

          ${statusLine ? `<div style="text-align:center;margin-bottom:22px">${statusLine}</div>` : ""}

          <div class="salutation"><b>${esc(d.supplier_company_name)}</b>:</div>
          <div class="intro">
              您好!我司(湖北欧阳聚德汽车有限公司)因生产需要,拟采购以下物料,
              烦请贵司根据实际情况填写单价后,点击页面底部「提交报价」按钮。
              如有疑问请联系对接采购员。
          </div>

          <div class="req-box">
              <div class="row">
                  <span class="lbl">要求交期</span>
                  <span class="val">${esc(d.delivery_date || "按合同另议")}</span>
                  <span class="lbl">交货地址</span>
                  <span class="val">${esc(d.delivery_address || "湖北十堰欧阳聚德厂区")}</span>
                  ${d.remark ? `<div class="remark"><b>需求说明:</b>${esc(d.remark)}</div>` : ""}
              </div>
          </div>

          <div class="quote-card">
              <h3>询价明细<span class="hint">${d.items.length} 项物料${isClosed ? "" : " · 请填写单价"}</span></h3>
              <table>
                  <thead>
                      <tr>
                          <th style="width:40px">#</th>
                          <th>物料 / 规格</th>
                          <th style="width:100px">数量</th>
                          <th style="width:160px">您的单价(元)</th>
                          <th>备注</th>
                          <th style="width:130px;text-align:right">小计</th>
                      </tr>
                  </thead>
                  <tbody>${itemRows}</tbody>
              </table>
              <div class="total-bar">
                  <div>
                      <span class="lbl">本单合计:</span>
                      <span class="val">¥ <span id="totalVal">0.00</span></span>
                  </div>
                  ${isClosed ? "" : `<button type="button" class="btn btn-primary" id="submitBtn">${hasQuoted ? "保存修改" : "提交报价"}</button>`}
              </div>
          </div>

          <div class="sign-block">
              <div class="company-line">湖北欧阳聚德汽车有限公司</div>
              <div>采购中心 · 2026年</div>
          </div>
        `;

        document.getElementById("content").innerHTML = '<div id="msgSlot"></div>' + html;

        // ===== 自动计算 =====
        const totalEl = document.getElementById("totalVal");
        function recalc() {
            let sum = 0;
            document.querySelectorAll("[data-row]").forEach(row => {
                const qty = parseFloat(row.dataset.qty) || 0;
                const price = parseFloat(row.querySelector("[data-price]").value) || 0;
                const subEl = row.querySelector("[data-subtotal]");
                if (price > 0) {
                    const sub = qty * price;
                    subEl.textContent = "¥" + fmtMoney(sub);
                    subEl.classList.remove("empty");
                    sum += sub;
                } else {
                    subEl.textContent = "—";
                    subEl.classList.add("empty");
                }
            });
            totalEl.textContent = fmtMoney(sum);
        }
        document.querySelectorAll("[data-price]").forEach(inp => inp.addEventListener("input", recalc));
        recalc();

        // ===== 提交 =====
        const submitBtn = document.getElementById("submitBtn");
        if (submitBtn) {
            submitBtn.addEventListener("click", async () => {
                const lines = [];
                for (const row of document.querySelectorAll("[data-row]")) {
                    const price = parseFloat(row.querySelector("[data-price]").value);
                    if (!price || price <= 0) continue;
                    lines.push({
                        item_id: parseInt(row.dataset.itemId),
                        unit_price: price,
                        note: row.querySelector("[data-note]").value.trim() || null,
                    });
                }
                if (!lines.length) {
                    showMsg("err", "请至少填写一行物料的单价");
                    return;
                }
                submitBtn.disabled = true;
                const oldText = submitBtn.textContent;
                submitBtn.textContent = "提交中...";
                try {
                    const res = await fetch("/api/v1/public/quote/" + encodeURIComponent(token), {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ lines }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "提交失败");
                    showMsg("ok", `报价已成功提交(共 ${lines.length} 项),感谢您的报价。如需修改,可继续在本页编辑后再次点击提交。`);
                    setTimeout(load, 1200);
                } catch (err) {
                    showMsg("err", err.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = oldText;
                }
            });
        }
    }

    function showMsg(kind, text) {
        const slot = document.getElementById("msgSlot");
        if (!slot) return;
        slot.innerHTML = `<div class="msg-box ${kind}">${esc(text)}</div>`;
        if (kind === "ok") {
            slot.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
    }

    load();
})();
</script>
</body>
</html>
